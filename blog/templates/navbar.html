<header class="bg-secondary text-white py-2">
    <div class="container-fluid">
        <span class="brand">c<span class="red-o">o</span>de<span class="thin">|star</span></span>
    </div>
</header>

<nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
    <div class="container-fluid">

        <a class="navbar-brand" href="{% url 'home' %}">CodeStar Blog</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link {% if request.path == home_url %}active{% endif %}"
                       href="{{ home_url }}">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.path == about_url %}active{% endif %}"
                       href="{{ about_url }}">About</a>
                </li>

                {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'account_logout' %}">Logout</a>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'account_login' %}">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'account_signup' %}">Sign Up</a>
                    </li>
                {% endif %}

            </ul>
        </div>
    </div>
</nav>
